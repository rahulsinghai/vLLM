# Nginx configuration for multi-model vLLM routing
#
# Routes requests to different vLLM instances based on URL path.
# Each vLLM instance serves a different model.
#
# Usage:
#   1. Start multiple vLLM servers on different ports (see below)
#   2. nginx -c /path/to/nginx-multi-model.conf
#
# Start vLLM instances:
#   vllm serve meta-llama/Meta-Llama-3.1-8B-Instruct --port 8001
#   vllm serve mistralai/Mistral-7B-Instruct-v0.3     --port 8002
#   vllm serve codellama/CodeLlama-13b-Instruct-hf    --port 8003

upstream llama {
    server 127.0.0.1:8001;
}

upstream mistral {
    server 127.0.0.1:8002;
}

upstream codellama {
    server 127.0.0.1:8003;
}

server {
    listen 8000;
    server_name _;

    # Health check endpoint
    location /health {
        return 200 '{"status": "ok"}';
        add_header Content-Type application/json;
    }

    # Route to Llama 3.1
    location /llama/ {
        rewrite ^/llama/(.*) /$1 break;
        proxy_pass http://llama;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;            # Required for streaming
    }

    # Route to Mistral
    location /mistral/ {
        rewrite ^/mistral/(.*) /$1 break;
        proxy_pass http://mistral;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Route to CodeLlama
    location /codellama/ {
        rewrite ^/codellama/(.*) /$1 break;
        proxy_pass http://codellama;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Default — return available models
    location / {
        return 200 '{"models": ["/llama/v1/", "/mistral/v1/", "/codellama/v1/"]}';
        add_header Content-Type application/json;
    }
}
