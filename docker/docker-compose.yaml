# docker-compose stack: vLLM + Prometheus + Grafana
#
# Usage:
#   cd docker
#   docker compose up -d
#
# Access:
#   vLLM API:  http://localhost:8000/v1
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3000 (admin/admin)

services:
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command:
      - "--model"
      - "${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--gpu-memory-utilization"
      - "0.90"
      - "--max-model-len"
      - "8192"
      - "--max-num-seqs"
      - "128"
      - "--dtype"
      - "auto"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s    # models take time to load
    networks:
      - vllm-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      vllm-server:
        condition: service_healthy
    networks:
      - vllm-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../observability/grafana/vllm-dashboard.json:/var/lib/grafana/dashboards/vllm-dashboard.json:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/vllm-dashboard.json
    depends_on:
      - prometheus
    networks:
      - vllm-net

volumes:
  huggingface-cache:
  prometheus-data:
  grafana-data:

networks:
  vllm-net:
    driver: bridge
